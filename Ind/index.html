<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple School App</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .hidden { display: none; }
        input, button { margin: 5px 0; padding: 8px; }
        #dashboard { background: #f4f4f4; padding: 20px; border-radius: 8px; }
    </style>
</head>
<body>

    <div id="home-page">
        <h1>Simple School App</h1>
        <p>Please log in or register.</p>
        
        <input type="email" id="email" placeholder="Email"><br>
        <input type="password" id="pass" placeholder="Password"><br>

        <button id="btn-register">Register</button>
        <button id="btn-login">Login</button>
        
        <p id="auth-error" style="color: red;"></p>
    </div>

    <div id="dashboard-page" class="hidden">
        <h1>Dashboard</h1>
        <p>Welcome, <span id="user-email"></span>!</p>

        <button id="btn-news">Load News</button>
        <button id="btn-announcements">Load Announcements</button>
        <button id="btn-logout" style="color: red;">Logout</button>

        <pre id="out"></pre>
    </div>

    <script type="module">
        // 1. Import Firebase functions
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { 
            getAuth, 
            createUserWithEmailAndPassword, 
            signInWithEmailAndPassword, 
            signOut, 
            onAuthStateChanged 
        } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // 2. Your Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBoHtkk8YcT2mIvy2taNKvbzHT8lQj-iuc",
            authDomain: "nsproject-b2c09.firebaseapp.com",
            projectId: "nsproject-b2c09",
            storageBucket: "nsproject-b2c09.firebasestorage.app",
            messagingSenderId: "71100276683",
            appId: "1:71100276683:web:db00826b2f56e74450204e",
            measurementId: "G-EQZ7MQK91H"
        };

        // 3. Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // 4. UI Elements
        const homePage = document.getElementById('home-page');
        const dashboardPage = document.getElementById('dashboard-page');
        const emailInput = document.getElementById('email');
        const passInput = document.getElementById('pass');
        const authError = document.getElementById('auth-error');
        const userEmailSpan = document.getElementById('user-email');
        const out = document.getElementById('out');

        // 5. Auth State Listener (Automatically shows dashboard if logged in)
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // User is signed in
                homePage.classList.add('hidden');
                dashboardPage.classList.remove('hidden');
                userEmailSpan.textContent = user.email;
                emailInput.value = '';
                passInput.value = '';
                authError.textContent = '';
            } else {
                // User is signed out
                homePage.classList.remove('hidden');
                dashboardPage.classList.add('hidden');
                out.innerText = '';
            }
        });

        // 6. Register Function
        document.getElementById('btn-register').addEventListener('click', async () => {
            try {
                authError.textContent = "Registering...";
                await createUserWithEmailAndPassword(auth, emailInput.value, passInput.value);
                alert("Registered successfully!");
            } catch (error) {
                authError.textContent = "Error: " + error.message;
            }
        });

        // 7. Login Function
        document.getElementById('btn-login').addEventListener('click', async () => {
            try {
                authError.textContent = "Logging in...";
                await signInWithEmailAndPassword(auth, emailInput.value, passInput.value);
            } catch (error) {
                authError.textContent = "Error: " + error.message;
            }
        });

        // 8. Logout Function
        document.getElementById('btn-logout').addEventListener('click', async () => {
            await signOut(auth);
        });

        // 9. Placeholder Data Loaders (These will need Firebase Firestore eventually)
        document.getElementById('btn-news').addEventListener('click', () => {
            out.innerText = "News feature coming soon! (Needs Firestore database)";
        });

        document.getElementById('btn-announcements').addEventListener('click', () => {
            out.innerText = "Announcements feature coming soon! (Needs Firestore database)";
        });
    </script>
</body>
</html>
